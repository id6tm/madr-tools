name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
  push:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Smoke test CLI
        run: target/release/madr --help

      - name: Check package contents
        run: npm pack --dry-run

  build-platform-packages:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Build ${{ matrix.platform }}-${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/madr
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: target/aarch64-unknown-linux-gnu/release/madr
          - platform: darwin
            arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/madr
          - platform: win32
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/madr.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.0
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create npm platform package
        run: npm run package-platform
        env:
          MADR_NPM_PLATFORM: ${{ matrix.platform }}
          MADR_NPM_ARCH: ${{ matrix.arch }}
          MADR_BINARY_PATH: ${{ matrix.binary }}

      - name: Check npm platform package contents
        run: npm pack --dry-run ./npm-packages/${{ matrix.platform }}-${{ matrix.arch }}
