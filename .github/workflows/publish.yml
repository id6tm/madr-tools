name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to attach binary assets to
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to attach binary assets to
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-platform-packages:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/madr
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: target/aarch64-unknown-linux-gnu/release/madr
          - platform: darwin
            arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/madr
          - platform: win32
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/madr.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: platform-packages
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create npm platform package
        run: npm run package-platform
        env:
          MADR_NPM_PLATFORM: ${{ matrix.platform }}
          MADR_NPM_ARCH: ${{ matrix.arch }}
          MADR_BINARY_PATH: ${{ matrix.binary }}

      - name: Prepare GitHub Release binary asset
        shell: bash
        run: |
          mkdir -p release-assets
          extension=""
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            extension=".exe"
          fi
          cp "${{ matrix.binary }}" "release-assets/madr-${{ matrix.platform }}-${{ matrix.arch }}${extension}"

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}-${{ matrix.arch }}
          path: npm-packages/${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload GitHub Release binary asset
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*

  publish:
    needs: build-platform-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download npm platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-packages

      - name: Download GitHub Release binary assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-binary-*
          path: release-assets
          merge-multiple: true

      - name: Upload binary assets to GitHub Release
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

      - name: Publish platform packages to npm
        run: |
          for package in npm-packages/*; do
            npm publish "./$package" --access public --provenance
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
